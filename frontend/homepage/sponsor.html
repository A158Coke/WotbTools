<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支持 WoTBTools</title>
<link rel="icon" type="image/x-icon" href="/icon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icon.png">
<script>
(function () {
  var match = document.cookie.match(/(?:^|;\s*)wotbtools-theme=([^;]+)/)
  var saved = null
  if (match) {
    try { saved = decodeURIComponent(match[1]) } catch (_) { saved = null }
  }
  if (!saved) {
    try { saved = localStorage.getItem('wotbtools-theme') } catch (_) { saved = null }
  }
  if (saved !== 'auto' && saved !== 'light' && saved !== 'dark') saved = 'auto'
  var mode = (!saved || saved === 'auto')
    ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
    : saved
  document.documentElement.dataset.theme = mode
})()
</script>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1117;
    --text: #c9d1d9;
    --heading: #f0f6fc;
    --muted: #8b949e;
    --card-bg: #161b22;
    --card-border: #30363d;
    --accent: #58a6ff;
    --footer: #484f58;
    --on-accent: #ffffff;
    --qr-bg: #ffffff;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #ffffff;
    --text: #24292f;
    --heading: #0d1117;
    --muted: #57606a;
    --card-bg: #f6f8fa;
    --card-border: #d0d7de;
    --accent: #0969da;
    --footer: #6e7681;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: background .25s, color .25s;
  }
  .topbar {
    position: fixed;
    inset: 0 0 auto;
    z-index: 100;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 20px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--card-border);
  }
  .tb-brand { color: var(--heading); font-size: 15px; font-weight: 700; text-decoration: none; }
  .tb-brand:hover { color: var(--accent); }
  .tb-spacer { flex: 1; }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .theme-bar { display: flex; gap: 2px; padding: 2px; background: var(--bg); border: 1px solid var(--card-border); border-radius: 7px; }
  .theme-bar button {
    padding: 4px 10px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-size: .73rem;
  }
  .theme-bar button:hover { color: var(--text); }
  .theme-bar button.active { background: var(--accent); color: var(--on-accent); font-weight: 600; }
  .lang-select {
    padding: 5px 10px;
    border: 1px solid var(--card-border);
    border-radius: 7px;
    background: var(--card-bg);
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-size: .73rem;
  }
  header { padding: 78px 24px 32px; text-align: center; }
  header h1 { color: var(--heading); font-size: 2rem; }
  main { width: 100%; max-width: 560px; padding: 0 24px 64px; }
  .card { margin-bottom: 24px; padding: 28px 24px; border: 1px solid var(--card-border); border-radius: 12px; background: var(--card-bg); }
  .card h2 { margin-bottom: 16px; color: var(--heading); font-size: 1.1rem; }
  .card p { margin-bottom: 12px; color: var(--muted); font-size: .92rem; line-height: 1.65; }
  .card p:last-child { margin-bottom: 0; }
  .note { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--card-border); color: var(--muted); font-size: .82rem; line-height: 1.55; }
  .qr-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; }
  .qr-item { text-align: center; }
  .qr-item img { width: 210px; height: 210px; padding: 4px; border-radius: 10px; background: var(--qr-bg); object-fit: contain; }
  .qr-item .label { margin-top: 6px; color: var(--muted); font-size: .82rem; }
  .unconfigured { padding: 24px 0; text-align: center; }
  footer { margin-top: auto; padding: 24px; color: var(--footer); font-size: .8rem; }
  [hidden] { display: none !important; }
  @media (max-width: 560px) {
    .topbar { height: 42px; padding: 4px 12px; }
    .theme-bar button { padding: 3px 8px; font-size: .68rem; }
    .lang-select { padding: 4px 7px; font-size: .68rem; }
    header { padding: 60px 16px 24px; }
    header h1 { font-size: 1.6rem; }
    .card { padding: 20px 16px; }
    .qr-item img { width: 170px; height: 170px; }
  }
</style>
</head>
<body>
<nav class="topbar" aria-label="WoTBTools">
  <a class="tb-brand" href="/">WoTBTools</a>
  <div class="tb-spacer"></div>
  <label class="sr-only" for="lang-select" data-i18n="language_label">语言</label>
  <select class="lang-select" id="lang-select"></select>
  <div class="theme-bar">
    <button type="button" data-theme="auto" data-i18n="theme_auto">跟随系统</button>
    <button type="button" data-theme="light" data-i18n="theme_light">亮色</button>
    <button type="button" data-theme="dark" data-i18n="theme_dark">暗色</button>
  </div>
</nav>

<header>
  <h1 data-i18n="sponsor_title">支持 WoTBTools</h1>
</header>

<main>
  <section class="card">
    <p data-i18n="sponsor_desc1">WoTBTools 是个人维护的免费工具。如果这个项目帮到了你，可以自愿赞助，用于服务器和维护成本。</p>
    <p data-i18n="sponsor_desc2">赞助完全自愿，不设置固定金额，不影响任何功能使用，也不会解锁额外服务。</p>
    <div class="note" data-i18n="sponsor_note">请勿在付款备注中填写敏感个人信息。</div>
  </section>

  <section class="card">
    <h2 data-i18n="sponsor_qr">扫码赞助</h2>
    <p id="sponsor-unconfigured" class="unconfigured" role="status" data-i18n="sponsor_unconfigured">赞助方式暂未配置</p>
    <div id="sponsor-methods" class="qr-row" hidden></div>
  </section>
</main>

<footer>WoTBTools &copy; 2026</footer>

<script id="sponsor-i18n" type="application/json">
{
  "zh": {
    "title": "支持 WoTBTools",
    "language_label": "语言",
    "sponsor_title": "支持 WoTBTools",
    "sponsor_desc1": "WoTBTools 是个人维护的免费工具。如果这个项目帮到了你，可以自愿赞助，用于服务器和维护成本。",
    "sponsor_desc2": "赞助完全自愿，不设置固定金额，不影响任何功能使用，也不会解锁额外服务。",
    "sponsor_note": "请勿在付款备注中填写敏感个人信息。",
    "sponsor_qr": "扫码赞助",
    "sponsor_unconfigured": "赞助方式暂未配置",
    "sponsor_alipay": "支付宝",
    "sponsor_wechat": "微信支付",
    "theme_auto": "跟随系统",
    "theme_light": "亮色",
    "theme_dark": "暗色"
  },
  "en": {
    "title": "Support WoTBTools",
    "language_label": "Language",
    "sponsor_title": "Support WoTBTools",
    "sponsor_desc1": "WoTBTools is a free tool maintained by an individual. If it has helped you, voluntary sponsorship is appreciated to cover server and maintenance costs.",
    "sponsor_desc2": "Sponsorship is completely voluntary, with no fixed amount, no features locked, and no additional services unlocked.",
    "sponsor_note": "Please do not include sensitive personal information in payment notes.",
    "sponsor_qr": "Scan to Sponsor",
    "sponsor_unconfigured": "Sponsorship methods are not configured yet",
    "sponsor_alipay": "Alipay",
    "sponsor_wechat": "WeChat Pay",
    "theme_auto": "Auto",
    "theme_light": "Light",
    "theme_dark": "Dark"
  },
  "ru": {
    "title": "Поддержать WoTBTools",
    "language_label": "Язык",
    "sponsor_title": "Поддержать WoTBTools",
    "sponsor_desc1": "WoTBTools — бесплатный инструмент, поддерживаемый одним человеком. Если он вам помог, вы можете добровольно поддержать расходы на сервер и обслуживание.",
    "sponsor_desc2": "Поддержка полностью добровольная, без фиксированной суммы, ограничений функций и дополнительных услуг.",
    "sponsor_note": "Пожалуйста, не указывайте конфиденциальные личные данные в комментариях к платежу.",
    "sponsor_qr": "Сканировать для поддержки",
    "sponsor_unconfigured": "Способы поддержки пока не настроены",
    "sponsor_alipay": "Alipay",
    "sponsor_wechat": "WeChat Pay",
    "theme_auto": "Авто",
    "theme_light": "Светлая",
    "theme_dark": "Тёмная"
  }
}
</script>
<script type="module">
import { loadSponsorMethods } from '/sponsor-config.js'

const html = document.documentElement
const themeButtons = document.querySelectorAll('.theme-bar button')
const media = window.matchMedia('(prefers-color-scheme: dark)')
const themeKey = 'wotbtools-theme'
const languageKey = 'wotb-lang'
const dictionaries = JSON.parse(document.getElementById('sponsor-i18n').textContent)
const languageSelect = document.getElementById('lang-select')
const methodsElement = document.getElementById('sponsor-methods')
const unconfiguredElement = document.getElementById('sponsor-unconfigured')
const failedTypes = new Set()
let activeLanguage = 'zh'
let sponsorMethods = []

function readCookie(name) {
  const match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]+)'))
  if (!match) return null
  try {
    return decodeURIComponent(match[1])
  } catch {
    return null
  }
}

function savePreference(name, value) {
  document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; domain=.wotbtools.com; max-age=31536000; SameSite=Lax'
  try {
    localStorage.setItem(name, value)
  } catch {
    // Cookie remains the primary cross-subdomain preference store.
  }
}

function readStorage(name) {
  try {
    return localStorage.getItem(name)
  } catch {
    return null
  }
}

function readTheme() {
  const saved = readCookie(themeKey) || readStorage(themeKey)
  return ['auto', 'light', 'dark'].includes(saved) ? saved : 'auto'
}

function refreshTheme() {
  const saved = readTheme()
  const mode = saved === 'auto' ? (media.matches ? 'dark' : 'light') : saved
  html.dataset.theme = mode
  themeButtons.forEach((button) => button.classList.toggle('active', button.dataset.theme === saved))
}

function renderMethods() {
  const dictionary = dictionaries[activeLanguage]
  const visibleMethods = sponsorMethods.filter((method) => !failedTypes.has(method.type))
  methodsElement.replaceChildren()

  visibleMethods.forEach((method) => {
    const item = document.createElement('div')
    const image = document.createElement('img')
    const label = document.createElement('div')
    const methodLabel = dictionary['sponsor_' + method.type]

    item.className = 'qr-item'
    image.src = method.image
    image.alt = methodLabel
    image.loading = 'lazy'
    image.decoding = 'async'
    image.addEventListener('error', () => {
      failedTypes.add(method.type)
      renderMethods()
    }, { once: true })
    label.className = 'label'
    label.textContent = methodLabel
    item.append(image, label)
    methodsElement.append(item)
  })

  methodsElement.hidden = visibleMethods.length === 0
  unconfiguredElement.hidden = visibleMethods.length > 0
}

function switchLanguage(language) {
  if (!dictionaries[language]) return
  activeLanguage = language
  html.lang = language
  languageSelect.value = language
  const dictionary = dictionaries[language]
  document.querySelectorAll('[data-i18n]').forEach((element) => {
    const key = element.dataset.i18n
    if (dictionary[key]) element.textContent = dictionary[key]
  })
  document.title = dictionary.title
  renderMethods()
}

[
  { value: 'zh', label: '中文' },
  { value: 'en', label: 'English' },
  { value: 'ru', label: 'Русский' }
].forEach(({ value, label }) => {
  const option = document.createElement('option')
  option.value = value
  option.textContent = label
  languageSelect.append(option)
})

themeButtons.forEach((button) => button.addEventListener('click', () => {
  savePreference(themeKey, button.dataset.theme)
  refreshTheme()
}))
media.addEventListener('change', refreshTheme)
languageSelect.addEventListener('change', () => {
  savePreference(languageKey, languageSelect.value)
  switchLanguage(languageSelect.value)
})

const savedLanguage = readCookie(languageKey) || readStorage(languageKey) || 'zh'
refreshTheme()
switchLanguage(dictionaries[savedLanguage] ? savedLanguage : 'zh')
sponsorMethods = await loadSponsorMethods()
renderMethods()
</script>
</body>
</html>
