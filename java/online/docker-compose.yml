# 本地起在线版: 三容器 — postgres + backend + frontend。
# 用法: cd java/online && docker compose up --build
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: wotb
      POSTGRES_USER: wotb
      POSTGRES_PASSWORD: wotb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  wotb-backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: wotb
    restart: unless-stopped

  wotb-frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
    ports:
      - "8088:80"
    depends_on:
      - wotb-backend
    restart: unless-stopped

volumes:
  postgres_data:
