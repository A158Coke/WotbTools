# 本地起在线版: 构建并运行与 CI/CD 完全相同的单镜像 (根 Dockerfile)。
# 用法: cd java/online && docker compose up --build
#   - 上下文为仓库根 (Dockerfile 需要 common/*.json + java/)
#   - 单容器内 nginx(:80) 托管 Vue 并反代 /api 到同容器的 Spring Boot(:8087)
services:
  wotb:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: wotb
    ports:
      - "8088:80"
    restart: unless-stopped
