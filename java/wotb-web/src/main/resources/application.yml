server:
  port: 8087

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:wotb}
    username: ${POSTGRES_USER:wotb}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate.ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://auth.wotbtools.com/realms/wotbtools}

logging:
  level:
    org.apache.poi: WARN

keycloak:
  admin:
    server-url: ${KEYCLOAK_ADMIN_SERVER_URL:https://auth.wotbtools.com}
    realm: ${KEYCLOAK_ADMIN_REALM:wotbtools}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:wotbtools-admin-api}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}

wotb:
  ai:
    # 空默认值：未配置密钥时应用仍可正常启动，/api/replay/analyze 返回 AI_NOT_CONFIGURED
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.deepseek.com}
    model: ${AI_MODEL:deepseek-chat}
    timeout-sec: ${AI_TIMEOUT_SEC:120}
  replay:
    max-concurrent-jobs: ${REPLAY_MAX_CONCURRENT_JOBS:2}
  boost:
    auto-confirm-hours: ${BOOST_AUTO_CONFIRM_HOURS:72}
    auto-confirm-scan-ms: ${BOOST_AUTO_CONFIRM_SCAN_MS:300000}
