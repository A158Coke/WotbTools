server:
  port: 8087

spring:
  servlet:
    multipart:
      # 上传限制 (回放约 2MB/个, 联赛可能一次传很多)
      max-file-size: 20MB
      max-request-size: 200MB
  web:
    resources:
      # 离线模式: 若打包了 Vue 静态资源(static/), Spring Boot 会一并提供
      static-locations: classpath:/static/

# POI 用 log4j2-api, 无实现时降噪
logging:
  level:
    org.apache.poi: WARN
