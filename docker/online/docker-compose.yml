# 开发者本地构建：从源码编译两镜像并启动三容器。
# 用法（任选其一，二选一即可）：
#   cd docker/online && docker compose up -d --build
#   docker compose -f docker/online/docker-compose.yml -p online up -d --build
# 注意：build.context 指向仓库根（../..），因为两个 Dockerfile 的 COPY 都按仓库根写
# （common/ java/ frontend/ homepage deploy/nginx/）；dockerfile 路径相对 context 解析。
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: wotb
      POSTGRES_USER: wotb
      POSTGRES_PASSWORD: wotb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wotb -d wotb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  wotb-backend:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: wotb
    restart: unless-stopped

  wotb-frontend:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8088:80"
    depends_on:
      - wotb-backend
    restart: unless-stopped

volumes:
  postgres_data:
