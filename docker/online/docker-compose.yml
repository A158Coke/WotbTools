# 开发者本地构建：从源码编译镜像并启动四容器。
# 用法：
#   cd docker/online && docker compose up -d --build
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: wotb
      POSTGRES_USER: wotb
      POSTGRES_PASSWORD: wotb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wotb -d wotb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ../keycloak/wotbtools-realm.json:/opt/keycloak/data/import/wotbtools-realm.json
    command: start --import-realm --hostname-strict=false --http-enabled=true --http-port=9000
    ports:
      - "9000:9000"
    restart: unless-stopped

  wotb-backend:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: wotb
      KEYCLOAK_ISSUER_URI: http://keycloak:9000/realms/wotbtools
    restart: unless-stopped

  wotb-frontend:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8088:80"
    depends_on:
      - wotb-backend
      - keycloak
    restart: unless-stopped

volumes:
  postgres_data: