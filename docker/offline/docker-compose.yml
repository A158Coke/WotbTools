# 离线版 / 本地一键启动：拉取 Docker Hub 镜像，无需源码。
# 用法：docker compose up -d
# 首次需 docker pull a158coke/wotbtool:backend-latest frontend-latest
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: wotb
      POSTGRES_USER: wotb
      POSTGRES_PASSWORD: wotb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  wotb-backend:
    image: a158coke/wotbtool:backend-latest
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: wotb
    restart: unless-stopped

  wotb-frontend:
    image: a158coke/wotbtool:frontend-latest
    ports:
      - "8088:80"
    depends_on:
      - wotb-backend
    restart: unless-stopped

volumes:
  postgres_data:
