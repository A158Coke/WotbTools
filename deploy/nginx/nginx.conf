server {
    listen 80;
    server_name auth.wotbtools.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auth.wotbtools.com;

    ssl_certificate /etc/letsencrypt/live/auth.wotbtools.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.wotbtools.com/privkey.pem;

    location / {
        proxy_pass http://keycloak:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name wotbtools.com www.wotbtools.com;

    root /homepage;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name replay.wotbtools.com;
    client_max_body_size 200m;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://wotb-backend:8087/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}