<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoTBTools</title>
<script>
(function(){
  var s = localStorage.getItem('wotbtools-theme');
  var m = (s==='dark') || (s!=='light' && matchMedia('(prefers-color-scheme:dark)').matches) ? 'dark' : 'light';
  var v = m==='dark'
    ? {bg:'#0d1117',t:'#c9d1d9',h:'#f0f6fc',mu:'#8b949e',cb:'#161b22',cbd:'#30363d',a:'#58a6ff',as:'rgba(88,166,255,.15)',tb:'#1f6feb33',f:'#484f58'}
    : {bg:'#ffffff',t:'#24292f',h:'#0d1117',mu:'#57606a',cb:'#f6f8fa',cbd:'#d0d7de',a:'#0969da',as:'rgba(9,105,218,.15)',tb:'#ddf4ff',f:'#6e7681'};
  var r = document.documentElement.style;
  r.setProperty('--bg',v.bg); r.setProperty('--text',v.t); r.setProperty('--heading',v.h); r.setProperty('--muted',v.mu); r.setProperty('--card-bg',v.cb); r.setProperty('--card-border',v.cbd); r.setProperty('--accent',v.a); r.setProperty('--accent-shadow',v.as); r.setProperty('--tag-bg',v.tb); r.setProperty('--footer',v.f);
})();
</script>
<style>
  :root { --bg:#0d1117; --text:#c9d1d9; --heading:#f0f6fc; --muted:#8b949e; --card-bg:#161b22; --card-border:#30363d; --accent:#58a6ff; --accent-shadow:rgba(88,166,255,.15); --tag-bg:#1f6feb33; --footer:#484f58 }
  @media (prefers-color-scheme: light) { :root { --bg:#ffffff; --text:#24292f; --heading:#0d1117; --muted:#57606a; --card-bg:#f6f8fa; --card-border:#d0d7de; --accent:#0969da; --accent-shadow:rgba(9,105,218,.15); --tag-bg:#ddf4ff; --footer:#6e7681 } }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    transition: background .25s, color .25s;
  }
  header {
    text-align: center; padding: 64px 24px 48px;
  }
  header h1 {
    font-size: 2.5rem; font-weight: 700; color: var(--heading); letter-spacing: -0.5px;
  }
  header p {
    margin-top: 12px; color: var(--muted); font-size: 1.1rem;
  }

  .theme-bar {
    position: fixed; top: 16px; right: 20px; z-index: 10;
    display: flex; gap: 4px;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 3px;
  }
  .theme-bar button {
    padding: 6px 14px; border: none; border-radius: 6px;
    background: transparent; color: var(--muted); font-size: .8rem;
    cursor: pointer; transition: background .15s, color .15s;
  }
  .theme-bar button:hover { color: var(--text) }
  .theme-bar button.active {
    background: var(--tag-bg); color: var(--accent); font-weight: 600;
  }

  .tools {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    max-width: 640px; width: 100%; padding: 0 24px 64px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 28px 24px;
    transition: border-color .2s, box-shadow .2s;
    text-decoration: none; color: inherit; display: block;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-shadow);
  }
  .card h2 { font-size: 1.25rem; color: var(--heading); margin-bottom: 8px }
  .card p  { font-size: .9rem; color: var(--muted); line-height: 1.5 }
  .card .tag {
    display: inline-block; margin-top: 12px;
    padding: 2px 10px; border-radius: 10px;
    background: var(--tag-bg); color: var(--accent); font-size: .75rem; font-weight: 600;
  }
  .coming-soon .card {
    opacity: .45; cursor: default; pointer-events: none;
  }
  .coming-soon .card:hover { border-color: var(--card-border); box-shadow: none }
  footer {
    margin-top: auto; padding: 24px; color: var(--footer); font-size: .8rem;
  }
</style>
</head>
<body>

<header>
  <h1>WoTBTools</h1>
  <p>《坦克世界闪击战》工具集</p>
</header>

<div class="theme-bar">
  <button data-theme="auto"  class="active">auto</button>
  <button data-theme="light">light</button>
  <button data-theme="dark">dark</button>
</div>

<div class="tools">
  <a class="card" href="https://replay.wotbtools.com">
    <h2>回放提取器</h2>
    <p>上传 .wotbreplay 回放文件，提取战斗数据并导出 Excel。支持多场次上传、评分系统、多语言界面。</p>
    <span class="tag">可用</span>
  </a>

  <div class="coming-soon">
    <div class="card">
      <h2>排行榜</h2>
      <p>查看玩家排名、胜率统计、场均数据 —— 按车辆、地图、模式多维过滤。</p>
      <span class="tag">规划中</span>
    </div>
  </div>

  <div class="coming-soon">
    <div class="card">
      <h2>战绩卡片</h2>
      <p>为个人主页或论坛生成实时战绩卡片，根据玩家数据自动更新。</p>
      <span class="tag">规划中</span>
    </div>
  </div>

  <div class="coming-soon">
    <div class="card">
      <h2>开发者 API</h2>
      <p>开放 API 查询坦克数据、地图名、评分配置等参考数据。</p>
      <span class="tag">规划中</span>
    </div>
  </div>
</div>

<footer>WoTBTools &mdash; 社区工具，非 Wargaming 官方产品</footer>

<script>
(function(){
  const html = document.documentElement;
  const btns = document.querySelectorAll('.theme-bar button');
  const mql = window.matchMedia('(prefers-color-scheme: dark)');
  const KEY = 'wotbtools-theme';

  const STYLES = {
    dark: {
      '--bg':'#0d1117', '--text':'#c9d1d9', '--heading':'#f0f6fc',
      '--muted':'#8b949e', '--card-bg':'#161b22', '--card-border':'#30363d',
      '--accent':'#58a6ff', '--accent-shadow':'rgba(88,166,255,.15)',
      '--tag-bg':'#1f6feb33', '--footer':'#484f58'
    },
    light: {
      '--bg':'#ffffff', '--text':'#24292f', '--heading':'#0d1117',
      '--muted':'#57606a', '--card-bg':'#f6f8fa', '--card-border':'#d0d7de',
      '--accent':'#0969da', '--accent-shadow':'rgba(9,105,218,.15)',
      '--tag-bg':'#ddf4ff', '--footer':'#6e7681'
    }
  };

  function setVars(mode) {
    const s = STYLES[mode];
    for (const k in s) html.style.setProperty(k, s[k]);
  }

  function refresh() {
    const saved = localStorage.getItem(KEY) || 'auto';
    const acting = saved === 'auto' ? (mql.matches ? 'dark' : 'light') : saved;
    setVars(acting);
    btns.forEach(b => b.classList.toggle('active', b.dataset.theme === saved));
  }

  btns.forEach(b => {
    b.addEventListener('click', () => {
      localStorage.setItem(KEY, b.dataset.theme);
      refresh();
    });
  });

  mql.addEventListener('change', refresh);
  refresh();
})();
</script>

</body>
</html>
