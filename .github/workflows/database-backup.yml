name: Production Database Backup
run-name: Backup production PostgreSQL by @${{ github.actor }}

on:
  schedule:
    # 03:15 Asia/Hong_Kong (UTC+8).
    - cron: "15 19 * * *"
  workflow_dispatch:

concurrency:
  group: production-maintenance
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install backup scripts
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/postgres-backup.sh,deploy/postgres-backup-inspect.sh,deploy/postgres-restore.sh"
          target: /opt/wotb
          overwrite: true
      - name: Create and verify backup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            chmod 700 /opt/wotb/deploy/postgres-backup.sh \
              /opt/wotb/deploy/postgres-backup-inspect.sh \
              /opt/wotb/deploy/postgres-restore.sh
            /opt/wotb/deploy/postgres-backup.sh --database wotb
            /opt/wotb/deploy/postgres-backup.sh --database keycloak
