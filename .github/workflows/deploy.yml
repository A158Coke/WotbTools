name: Build & Deploy
run-name: Deploy ${{ github.ref_name }} by @${{ github.actor }}

# 同一时刻只跑一个部署; 新 push 取消进行中的旧 run, 避免 VPS 上并发部署打架
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    # 只在影响镜像的改动上触发 (纯文档 push 不重建)
    paths:
      - "java/**"
      - "common/**"
      - "Dockerfile"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:   # 允许手动触发 (例如仅想重新部署)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: a158coke   # Docker Hub 用户名非机密(已出现在镜像名中); 仅 token 用 secret
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # Docker Hub 仓库启用了标签不可变, 故只推唯一的 sha 标签(永不覆盖); 不推 latest
          tags: a158coke/wotbtool:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/wotb
            cd /opt/wotb
            cat > docker-compose.yml <<'EOF'
            services:
              wotb:
                image: a158coke/wotbtool:${{ steps.vars.outputs.sha }}
                container_name: wotb
                ports:
                  - "8088:80"
                restart: unless-stopped
            EOF
            docker compose pull
            docker compose up -d
            docker image prune -f
