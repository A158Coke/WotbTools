name: Build & Deploy
run-name: Deploy ${{ github.ref_name }} by @${{ github.actor }} to Production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - "common/**"
      - "homepage/**"
      - "Dockerfile.backend"
      - "Dockerfile.frontend"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: a158coke
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Builds
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            a158coke/wotbtool:backend-${{ steps.vars.outputs.sha }}
            a158coke/wotbtool:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            a158coke/wotbtool:frontend-${{ steps.vars.outputs.sha }}
            a158coke/wotbtool:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/wotb
            cd /opt/wotb
            docker rm -f wotb wotb-backend wotb-frontend 2>/dev/null || true
            cat > docker-compose.yml <<'EOF'
            services:
              postgres:
                image: postgres:18-alpine
                environment:
                  POSTGRES_DB: wotb
                  POSTGRES_USER: wotb
                  POSTGRES_PASSWORD: wotb
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                restart: unless-stopped
              wotb-backend:
                image: a158coke/wotbtool:backend-${{ steps.vars.outputs.sha }}
                depends_on:
                  - postgres
                environment:
                  SPRING_PROFILES_ACTIVE: postgres
                  POSTGRES_HOST: postgres
                  POSTGRES_PASSWORD: wotb
                restart: unless-stopped
              wotb-frontend:
                image: a158coke/wotbtool:frontend-${{ steps.vars.outputs.sha }}
                ports:
                  - "8088:80"
                depends_on:
                  - wotb-backend
                restart: unless-stopped
            volumes:
              postgres_data:
            EOF
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
