name: Build & Deploy

on:
  push:
    branches: [main]
    # 只在影响镜像的改动上触发 (纯文档 push 不重建)
    paths:
      - "java/**"
      - "common/**"
      - "Dockerfile"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:   # 允许手动触发 (例如仅想重新部署)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            a158coke/wotbtool:latest
            a158coke/wotbtool:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/wotb
            cd /opt/wotb
            cat > docker-compose.yml <<'EOF'
            services:
              wotb:
                image: a158coke/wotbtool:latest
                container_name: wotb
                ports:
                  - "8088:80"
                restart: unless-stopped
            EOF
            docker compose pull
            docker compose up -d
            docker image prune -f
