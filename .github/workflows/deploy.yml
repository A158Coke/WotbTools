name: Build & Deploy
run-name: Deploy ${{ github.ref_name }} by @${{ github.actor }} to Production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - "frontend/**"
      - "common/**"
      - "docker/Dockerfile.backend"
      - "docker/Dockerfile.frontend"
      - "docker/Dockerfile.keycloak"
      - "docker/keycloak/**"
      - "keycloak-juhe-qq-provider/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  GHCR_IMAGE_PREFIX: ghcr.io/a158coke/wotbtools
  SHORT_SHA: sha-${{ github.sha }}

jobs:
  # ── 路径检测：判断哪些组件需要构建 ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.backend.outputs.changed }}
      frontend: ${{ steps.frontend.outputs.changed }}
      keycloak: ${{ steps.keycloak.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check backend changes
        id: backend
        run: |
          git diff --quiet HEAD~1 -- java/ common/tankopedia.json docker/Dockerfile.backend \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Check frontend changes
        id: frontend
        run: |
          git diff --quiet HEAD~1 -- frontend/ docker/Dockerfile.frontend \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Check keycloak changes
        id: keycloak
        run: |
          git diff --quiet HEAD~1 -- docker/Dockerfile.keycloak docker/keycloak/ keycloak-juhe-qq-provider/ \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

  # ── 构建后端 ────────────────────────────────────────────────────
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_PREFIX }}-backend:${{ env.SHORT_SHA }}
            ${{ env.GHCR_IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # ── 构建前端 ────────────────────────────────────────────────────
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_PREFIX }}-frontend:${{ env.SHORT_SHA }}
            ${{ env.GHCR_IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # ── 构建 Keycloak ───────────────────────────────────────────────
  build-keycloak:
    needs: changes
    if: needs.changes.outputs.keycloak == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.keycloak
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_PREFIX }}-keycloak:${{ env.SHORT_SHA }}
            ${{ env.GHCR_IMAGE_PREFIX }}-keycloak:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        env:
          KEYCLOAK_BUILD_FILE: ${{ github.workspace }}/keycloak-juhe-qq-provider

  # ── 部署：等全部构建完成后（略过跳过的），统一 pull + restart ──
  deploy:
    needs: [build-backend, build-frontend, build-keycloak]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/wotb
            cd /opt/wotb
            rm -rf init-db.sql
            cat > init-db.sql <<'EOF'
            CREATE DATABASE keycloak;
            EOF
            docker rm -f wotb wotb-backend wotb-frontend 2>/dev/null || true
            cat > docker-compose.yml <<'ENDCOMPOSE'
            services:
              postgres:
                image: postgres:18-alpine
                ports:
                  - "127.0.0.1:5432:5432"
                environment:
                  POSTGRES_DB: wotb
                  POSTGRES_USER: wotb
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                volumes:
                  - postgres_data:/var/lib/postgresql
                  - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
                restart: unless-stopped
              keycloak:
                image: ghcr.io/a158coke/wotbtools-keycloak:${{ env.SHORT_SHA }}
                environment:
                  KC_BOOTSTRAP_ADMIN_USERNAME: admin
                  KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_ADMIN_PASSWORD }}
                  KC_DB: postgres
                  KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
                  KC_DB_USERNAME: wotb
                  KC_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                command: start --hostname=auth.wotbtools.com --hostname-strict=false --http-enabled=true --http-port=8080 --proxy-headers=xforwarded
                ports:
                  - "127.0.0.1:8080:8080"
                depends_on:
                  - postgres
                restart: unless-stopped
              wotb-backend:
                image: ghcr.io/a158coke/wotbtools-backend:${{ env.SHORT_SHA }}
                depends_on:
                  - postgres
                  - keycloak
                environment:
                  POSTGRES_HOST: postgres
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  KEYCLOAK_ISSUER_URI: https://auth.wotbtools.com/realms/wotbtools
                  KEYCLOAK_ADMIN_SERVER_URL: https://auth.wotbtools.com
                  KEYCLOAK_ADMIN_REALM: wotbtools
                  KEYCLOAK_ADMIN_CLIENT_ID: wotbtools-admin-api
                  KEYCLOAK_ADMIN_CLIENT_SECRET: ${{ secrets.KEYCLOAK_ADMIN_CLIENT_SECRET }}
                restart: unless-stopped
              wotb-frontend:
                image: ghcr.io/a158coke/wotbtools-frontend:${{ env.SHORT_SHA }}
                ports:
                  - "127.0.0.1:8088:80"
                depends_on:
                  - wotb-backend
                  - keycloak
                restart: unless-stopped
            volumes:
              postgres_data:
            ENDCOMPOSE
            for attempt in 1 2 3; do
              docker compose pull && break
              echo "docker compose pull failed (attempt $attempt), retrying in 10s..."
              sleep 10
            done
            docker compose up -d --remove-orphans
            docker compose exec -T postgres psql -U wotb -d wotb -c "CREATE DATABASE keycloak;" 2>/dev/null || true
            docker image prune -af
            docker builder prune -af
            for i in $(seq 1 30); do
              if docker compose ps | grep -qE "Restarting|Exited|unhealthy"; then
                sleep 2
              else
                break
              fi
            done
            if docker compose ps | grep -qE "Restarting|Exited|unhealthy"; then
              echo "ERROR: Containers not healthy!"
              docker compose ps
              docker compose logs --tail 50
              exit 1
            fi

  # ── 清理 GHCR（独立 job，清理失败不影响部署） ──────────────────
  cleanup-ghcr:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune backend versions (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-backend
          package-type: container
          min-versions-to-keep: 5
      - name: Prune frontend versions (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-frontend
          package-type: container
          min-versions-to-keep: 5
      - name: Prune keycloak versions (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-keycloak
          package-type: container
          min-versions-to-keep: 5