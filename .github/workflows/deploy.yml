name: Build & Deploy
run-name: Deploy ${{ github.ref_name }} by @${{ github.actor }} to Production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - "frontend/**"
      - "common/**"
      - "homepage/**"
      - "docker/Dockerfile.backend"
      - "docker/Dockerfile.frontend"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: a158coke
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Builds
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            a158coke/wotbtool:backend-${{ steps.vars.outputs.sha }}
            a158coke/wotbtool:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            a158coke/wotbtool:frontend-${{ steps.vars.outputs.sha }}
            a158coke/wotbtool:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/wotb
            cd /opt/wotb
            docker rm -f wotb wotb-backend wotb-frontend 2>/dev/null || true
            cat > docker-compose.yml <<'EOF'
            services:
              postgres:
                image: postgres:18-alpine
                ports:
                  - "127.0.0.1:5432:5432"
                environment:
                  POSTGRES_DB: wotb
                  POSTGRES_USER: wotb
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                  - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
                restart: unless-stopped
              keycloak:
                image: quay.io/keycloak/keycloak:26.1
                environment:
                  KC_BOOTSTRAP_ADMIN_USERNAME: admin
                  KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_ADMIN_PASSWORD }}
                  KC_DB: postgres
                  KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
                  KC_DB_USERNAME: wotb
                  KC_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                command: start --hostname=auth.wotbtools.com --hostname-strict=false --http-enabled=true --http-port=8080 --proxy-headers=xforwarded
                ports:
                  - "127.0.0.1:8080:8080"
                depends_on:
                  - postgres
                restart: unless-stopped
              wotb-backend:
                image: a158coke/wotbtool:backend-${{ steps.vars.outputs.sha }}
                depends_on:
                  - postgres
                  - keycloak
                environment:
                  SPRING_PROFILES_ACTIVE: postgres
                  POSTGRES_HOST: postgres
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  KEYCLOAK_ISSUER_URI: https://auth.wotbtools.com/realms/wotbtools
                restart: unless-stopped
              wotb-frontend:
                image: a158coke/wotbtool:frontend-${{ steps.vars.outputs.sha }}
                ports:
                  - "127.0.0.1:8088:80"
                depends_on:
                  - wotb-backend
                  - keycloak
                restart: unless-stopped
            volumes:
              postgres_data:
            EOF
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            # 健康检查：等待所有容器无 restarting 状态，最多 60 秒
            for i in $(seq 1 30); do
              if docker compose ps | grep -qE "Restarting|Exited|unhealthy"; then
                sleep 2
              else
                break
              fi
            done
            if docker compose ps | grep -qE "Restarting|Exited|unhealthy"; then
              echo "ERROR: Containers not healthy!"
              docker compose ps
              docker compose logs --tail 50
              exit 1
            fi
