name: Build & Deploy
run-name: Deploy ${{ github.ref_name }} by @${{ github.actor }} to Production

concurrency:
  group: production-maintenance
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - "frontend/**"
      - "common/**"
      - ".dockerignore"
      - "docker/Dockerfile.backend"
      - "docker/Dockerfile.frontend"
      - "docker/Dockerfile.keycloak"
      - "docker/keycloak/**"
      - "keycloak-juhe-qq-provider/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  GHCR_IMAGE_PREFIX: ghcr.io/a158coke/wotbtools

jobs:
  # ── 路径检测：判断哪些组件需要构建 ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      keycloak: ${{ steps.filter.outputs.keycloak }}
      deployment: ${{ steps.filter.outputs.deployment }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Check complete push change range
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          zero_sha="0000000000000000000000000000000000000000"

          if [[ "$EVENT_NAME" == "workflow_dispatch" || -z "$BEFORE_SHA" || "$BEFORE_SHA" == "$zero_sha" ]]; then
            backend=true
            frontend=true
            keycloak=true
            deployment=true
          else
            if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "$BEFORE_SHA"
            fi
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
            printf '%s\n' "$changed_files"

            backend=false
            frontend=false
            keycloak=false
            deployment=false

            if grep -Eq '^(java/|common/(tankopedia|rating|map_names)\.json$|docker/Dockerfile\.backend$|\.dockerignore$)' <<< "$changed_files"; then
              backend=true
            fi
            if grep -Eq '^(frontend/|common/map_names\.json$|common/assets/|docker/Dockerfile\.frontend$|deploy/nginx/|\.dockerignore$)' <<< "$changed_files"; then
              frontend=true
            fi
            if grep -Eq '^(docker/Dockerfile\.keycloak$|docker/keycloak/|keycloak-juhe-qq-provider/|java/settings-docker\.xml$|\.dockerignore$)' <<< "$changed_files"; then
              keycloak=true
            fi
            if grep -Eq '^(deploy/|\.github/workflows/deploy\.yml$)' <<< "$changed_files"; then
              deployment=true
            fi
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "keycloak=$keycloak"
            echo "deployment=$deployment"
          } >> "$GITHUB_OUTPUT"

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/cache@v4
        with:
          path: java/.m2repo
          key: ${{ runner.os }}-maven-${{ hashFiles('java/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Run Java tests
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress -s settings.xml -Dmaven.repo.local=.m2repo test

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── 构建后端 ────────────────────────────────────────────────────
  build-backend:
    needs: [changes, test-backend]
    if: always() && needs.changes.outputs.backend == 'true' && needs.test-backend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_PREFIX }}-backend:${{ needs.changes.outputs.tag }}
            ${{ env.GHCR_IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # ── 构建前端 ────────────────────────────────────────────────────
  build-frontend:
    needs: [changes, test-frontend]
    if: always() && needs.changes.outputs.frontend == 'true' && needs.test-frontend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_PREFIX }}-frontend:${{ needs.changes.outputs.tag }}
            ${{ env.GHCR_IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # ── 构建 Keycloak ───────────────────────────────────────────────
  build-keycloak:
    needs: changes
    if: needs.changes.outputs.keycloak == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.keycloak
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_PREFIX }}-keycloak:${{ needs.changes.outputs.tag }}
            ${{ env.GHCR_IMAGE_PREFIX }}-keycloak:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
        env:
          KEYCLOAK_BUILD_FILE: ${{ github.workspace }}/keycloak-juhe-qq-provider

  # ── 部署：等全部构建完成后（至少有一个构建），统一 pull + restart ──
  deploy:
    needs: [changes, test-backend, test-frontend, build-backend, build-frontend, build-keycloak]
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.deployment == 'true' ||
       needs.build-backend.result != 'skipped' ||
       needs.build-frontend.result != 'skipped' ||
       needs.build-keycloak.result != 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /opt/wotb
      - name: Install deployment scripts
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy
          target: /opt/wotb
          overwrite: true
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 35m
          script: |
            set -e
            mkdir -p /opt/wotb
            cd /opt/wotb
            mkdir -p config/sponsor
            if [ ! -e config/sponsor-config.json ] && [ ! -L config/sponsor-config.json ]; then
              install -m 644 deploy/sponsor-config.example.json config/sponsor-config.json
            fi
            chmod 700 deploy/postgres-backup.sh deploy/postgres-backup-inspect.sh deploy/postgres-restore.sh
            if [ -f docker-compose.yml ]; then
              deploy/postgres-backup.sh --database wotb
              deploy/postgres-backup.sh --database keycloak
            else
              echo "No existing deployment; skipping pre-deploy backup."
            fi
            docker rm -f wotb wotb-backend wotb-frontend 2>/dev/null || true
            cat > docker-compose.yml <<'ENDCOMPOSE'
            services:
              postgres:
                image: postgres:18-alpine
                ports:
                  - "127.0.0.1:5432:5432"
                environment:
                  POSTGRES_DB: wotb
                  POSTGRES_USER: wotb
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                volumes:
                  - postgres_data:/var/lib/postgresql
                  - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
                restart: unless-stopped
              keycloak:
                image: ghcr.io/a158coke/wotbtools-keycloak:latest
                environment:
                  KC_BOOTSTRAP_ADMIN_USERNAME: admin
                  KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_ADMIN_PASSWORD }}
                  KC_DB: postgres
                  KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
                  KC_DB_USERNAME: wotb
                  KC_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                command: start --hostname=auth.wotbtools.com --hostname-strict=false --http-enabled=true --http-port=8080 --proxy-headers=xforwarded
                ports:
                  - "127.0.0.1:8080:8080"
                depends_on:
                  - postgres
                restart: unless-stopped
              wotb-backend:
                image: ghcr.io/a158coke/wotbtools-backend:latest
                depends_on:
                  - postgres
                  - keycloak
                environment:
                  POSTGRES_HOST: postgres
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  KEYCLOAK_ISSUER_URI: https://auth.wotbtools.com/realms/wotbtools
                  KEYCLOAK_ADMIN_SERVER_URL: https://auth.wotbtools.com
                  KEYCLOAK_ADMIN_REALM: wotbtools
                  KEYCLOAK_ADMIN_CLIENT_ID: wotbtools-admin-api
                  KEYCLOAK_ADMIN_CLIENT_SECRET: ${{ secrets.KEYCLOAK_ADMIN_CLIENT_SECRET }}
                  BOOST_AUTO_CONFIRM_HOURS: "${{ vars.BOOST_AUTO_CONFIRM_HOURS || '72' }}"
                  BOOST_AUTO_CONFIRM_SCAN_MS: "${{ vars.BOOST_AUTO_CONFIRM_SCAN_MS || '300000' }}"
                  AI_API_KEY: ${{ secrets.AI_API_KEY }}
                  AI_BASE_URL: "${{ vars.AI_BASE_URL || 'https://api.deepseek.com' }}"
                  AI_MODEL: "${{ vars.AI_MODEL || 'deepseek-chat' }}"
                restart: unless-stopped
              wotb-frontend:
                image: ghcr.io/a158coke/wotbtools-frontend:latest
                ports:
                  - "127.0.0.1:8088:80"
                volumes:
                  - ./config/sponsor-config.json:/usr/share/nginx/html/sponsor-config.json:ro
                  - ./config/sponsor:/usr/share/nginx/html/sponsor-assets:ro
                depends_on:
                  - wotb-backend
                  - keycloak
                restart: unless-stopped
            volumes:
              postgres_data:
            ENDCOMPOSE
            pull_succeeded=false
            for attempt in 1 2 3; do
              if docker compose pull; then
                pull_succeeded=true
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "docker compose pull failed (attempt $attempt), retrying in 10s..."
                sleep 10
              fi
            done
            if [ "$pull_succeeded" != "true" ]; then
              echo "ERROR: docker compose pull failed after 3 attempts." >&2
              exit 1
            fi
            docker compose up -d --remove-orphans
            docker compose exec -T postgres psql -U wotb -d wotb -c "CREATE DATABASE keycloak;" 2>/dev/null || true
            docker image prune -af
            docker builder prune -af
            backend_ready=false
            for i in $(seq 1 60); do
              if docker compose ps | grep -qE "Restarting|Exited|unhealthy"; then
                sleep 2
                continue
              fi
              if docker compose exec -T wotb-backend wget -qO- http://127.0.0.1:8087/api/health >/tmp/wotb-backend-health.txt 2>/dev/null; then
                backend_ready=true
                break
              fi
              sleep 2
            done
            if [ "$backend_ready" != "true" ]; then
              echo "ERROR: Backend health check failed!"
              docker compose ps
              echo "== backend logs =="
              docker compose logs --tail 160 wotb-backend
              echo "== frontend logs =="
              docker compose logs --tail 80 wotb-frontend
              exit 1
            fi

  # ── 清理 GHCR（独立 job，清理失败不影响部署） ──────────────────
  cleanup-ghcr:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune backend versions (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-backend
          package-type: container
          min-versions-to-keep: 5
      - name: Prune frontend versions (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-frontend
          package-type: container
          min-versions-to-keep: 5
      - name: Prune keycloak versions (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-keycloak
          package-type: container
          min-versions-to-keep: 5
