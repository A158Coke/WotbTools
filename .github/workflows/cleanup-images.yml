name: Cleanup Docker Images
run-name: Cleanup Docker Hub (keep N tags/family + prune untagged digests)

on:
  workflow_dispatch:
    inputs:
      keep:
        description: "每个 *-sha-* 家族保留的 tag 数"
        default: "10"
      dry_run:
        description: "untagged digest 删除: true=仅预览, false=真删"
        type: boolean
        default: true
  schedule:
    - cron: '0 3 * * 1'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup Docker Hub
        env:
          DOCKER_USER: a158coke
          DOCKER_TOKEN: ${{ secrets.DOCKER_PASSWORD }}
          KEEP: ${{ github.event.inputs.keep || '10' }}
          # 手动触发默认 dry_run=true(预览); 定时触发 inputs 为空 -> 真删
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: bash .github/scripts/cleanup-dockerhub.sh
