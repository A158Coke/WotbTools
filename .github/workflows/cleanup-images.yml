name: Cleanup GHCR Images
run-name: Cleanup GHCR (keep N versions per package)

on:
  workflow_dispatch:
    inputs:
      keep:
        description: "每个镜像包保留的版本数"
        default: "10"
  schedule:
    - cron: '0 3 * * 1'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune backend versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-backend
          package-type: container
          min-versions-to-keep: ${{ github.event.inputs.keep || '10' }}
      - name: Prune frontend versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: wotbtools-frontend
          package-type: container
          min-versions-to-keep: ${{ github.event.inputs.keep || '10' }}
